<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Online | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0B2545; --navy-mid: #163A60; --saffron: #E8620A; --white: #FFFFFF;
            --bg: #F4F6FA; --border: #E5E7EB; --slate: #374151; --muted: #6B7280;
            --danger: #B71C1C; --danger-bg: #FFF0F0; --danger-border: #FFCDD2;
            --radius-md: 10px; --transition: 0.2s ease;
        }
        body { font-family: 'Sora', sans-serif; background: var(--navy); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { width: 100%; max-width: 400px; background: var(--white); padding: 40px 30px; border-radius: var(--radius-md); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .login-box-header { margin-bottom: 24px; text-align: center; }
        .login-box-header h3 { font-size: 22px; color: var(--navy); margin-bottom: 6px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--slate); margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .form-input { width: 100%; padding: 11px 14px 11px 38px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-size: 14px; outline: none; }
        .form-input:focus { border-color: var(--navy); }
        .btn-login { width: 100%; background: var(--navy); color: white; border: none; padding: 13px; font-size: 14.5px; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-login:hover { background: var(--navy-mid); }
        .error-msg { display: none; align-items: center; gap: 9px; background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-md); padding: 11px 14px; font-size: 13px; color: var(--danger); margin-bottom: 20px; }
        .error-msg.show { display: flex; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-box-header">
            <h3>Admin Panel Sign In</h3>
            <p>Enter your system credentials to authenticate</p>
        </div>
        <div id="errorBox" class="error-msg">
            <i class="fa fa-circle-exclamation"></i>
            <span id="errorText">Invalid authorization credentials.</span>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <i class="fa fa-user"></i>
                    <input type="text" id="username" class="form-input" placeholder="admin" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Admin Secret Key</label>
                <div class="input-wrap">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="Enter ADMIN_SECRET string" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fa fa-shield-halved"></i> Verify Security Clearance
            </button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const key = document.getElementById('password').value.trim();
            const BACKEND = window.location.origin; // Dynamically assigns your live URL on Render

            try {
                // Securely test token verification against backend admin logic
                const res = await fetch(`${BACKEND}/admin/applications`, {
                    headers: { 'x-admin-key': key }
                });

                // Grant entrance only if username fits and server returns a valid HTTP 200 array
                if (res.ok && user === "admin") {
                    localStorage.setItem('admin_session', 'authenticated_true');
                    localStorage.setItem('admin_secret_token', key); // Stores key safely for downstream headers
                    window.location.href = "admin.html";
                } else {
                    document.getElementById('errorBox').classList.add('show');
                }
            } catch (err) {
                alert("Network communication error. Verify your Render service deployment is active.");
            }
        }
    </script>
</body>
</html>
