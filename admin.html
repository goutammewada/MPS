<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Online | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0B2545; --navy-mid: #163A60; --saffron: #E8620A; --saffron-light: #FFF0E8;
            --saffron-dark: #B84D06; --bg: #F4F6FA; --white: #FFFFFF; --border: #E5E7EB;
            --muted: #6B7280; --slate: #374151; --radius: 10px; --radius-lg: 14px;
        }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--slate); font-size: 14px; margin-left: 240px; }
        .sidebar { width: 240px; background: var(--navy); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; z-index: 200; }
        .sidebar-brand { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); color: white; }
        .sidebar-brand .brand-mark { width: 40px; height: 40px; background: var(--saffron); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; margin-bottom: 10px; }
        .sidebar-nav { flex: 1; padding: 16px 12px; }
        .nav-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0 8px; margin: 16px 0 8px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13px; }
        .nav-item.active { background: rgba(232,98,10,0.18); color: #F5A875; }
        .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .page-body { padding: 24px 28px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; gap: 14px; }
        .stat-num { font-size: 24px; font-weight: 700; color: var(--navy); }
        .filters-bar { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .search-wrap { position: relative; flex: 1; }
        .search-input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); outline: none; }
        .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #F8FAFC; font-size: 11.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        .doc-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; margin: 2px; font-size: 12px; background: #E6F1FB; color: #185FA5; text-decoration: none; border-radius: 6px; }
        .status-select { padding: 5px 10px; border-radius: 20px; font-weight: 600; font-size: 12px; cursor: pointer; }
        .btn-delete { background: #FFF0F0; color: #B71C1C; border: 1px solid #FFCDD2; padding: 6px 12px; border-radius: 7px; cursor: pointer; }
        .btn-export { background: #1A6B3C; color: white; border: none; padding: 8px 16px; font-weight: 600; border-radius: 8px; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: white; padding: 12px 20px; border-radius: 10px; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark">MP</div>
            <h2>MP Online Admin</h2>
            <p>Management Portal</p>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item active" href="admin.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a class="nav-item" href="track.html"><i class="fa-solid fa-magnifying-glass"></i> Track</a>
        </nav>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1>Applications Dashboard</h1>
            <button class="btn-export" onclick="exportTableToExcel()"><i class="fa-solid fa-file-excel"></i> Export to Excel</button>
        </div>

        <div class="page-body">
            <div class="stats-grid">
                <div class="stat-card"><div><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div></div>
                <div class="stat-card"><div><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Pending</div></div></div>
                <div class="stat-card"><div><div class="stat-num" id="stat-completed">—</div><div class="stat-label">Completed</div></div></div>
                <div class="stat-card"><div><div class="stat-num" id="stat-rejected">—</div><div class="stat-label">Rejected</div></div></div>
            </div>

            <div class="filters-bar">
                <div class="search-wrap">
                    <input class="search-input" id="searchInput" type="text" placeholder="Search..." oninput="filterTable()">
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>App ID</th>
                            <th>Applicant</th>
                            <th>Service Type</th>
                            <th>Documents</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        if (localStorage.getItem('admin_session') !== 'authenticated_true') {
            window.location.href = "login.html";
        }

        const BACKEND = ""; // Matches your Render URL
        const secretKey = localStorage.getItem('admin_secret_key'); // Fetch the stored token
        let allData = [];
        let filteredData = [];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-pending').textContent = data.filter(a => a.status === 'Pending').length;
            document.getElementById('stat-completed').textContent = data.filter(a => a.status === 'Completed').length;
            document.getElementById('stat-rejected').textContent = data.filter(a => a.status === 'Rejected').length;
        }

        function renderTable(data) {
            const tbody = document.getElementById('adminTableBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No records found.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(app => {
                let docs = '';
                if (app.photo_path) docs += `<a href="${BACKEND}${app.photo_path}" target="_blank" class="doc-btn"><i class="fa-solid fa-image"></i> Photo</a>`;
                if (app.aadhaar_path) docs += `<a href="${BACKEND}${app.aadhaar_path}" target="_blank" class="doc-btn"><i class="fa-solid fa-id-card"></i> Aadhaar</a>`;
                if (app.signature_path) docs += `<a href="${BACKEND}${app.signature_path}" target="_blank" class="doc-btn"><i class="fa-solid fa-pen"></i> Sign</a>`;
                if (!docs) docs = `<span>No files</span>`;

                return `
                <tr>
                    <td>#${app.id}</td>
                    <td><b>${app.applicant_name}</b><br><small>${app.phone}</small></td>
                    <td>${app.service_type}</td>
                    <td>${docs}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${app.id}, this.value)">
                            <option value="Pending" ${app.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="In Progress" ${app.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option value="Completed" ${app.status === 'Completed' ? 'selected' : ''}>Completed</option>
                            <option value="Rejected" ${app.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                    </td>
                    <td><button class="btn-delete" onclick="deleteApplication(${app.id})"><i class="fa-solid fa-trash"></i> Delete</button></td>
                </tr>`;
            }).join('');
        }

        async function loadApplications() {
            try {
                const res = await fetch(`${BACKEND}/admin/applications`, {
                    headers: { 'x-admin-key': secretKey } // INJECTED SECURE HEADER
                });
                allData = await res.json();
                filteredData = [...allData];
                updateStats(allData);
                renderTable(filteredData);
            } catch (err) {
                showToast('Failed to load applications from server.');
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                const res = await fetch(`${BACKEND}/admin/applications/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': secretKey }, // INJECTED SECURE HEADER
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) showToast('Status updated successfully.');
            } catch (err) {
                showToast('Failed to change status.');
            }
        }

        async function deleteApplication(id) {
            if (!confirm('Permanently remove application?')) return;
            try {
                const res = await fetch(`${BACKEND}/admin/applications/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-key': secretKey } // INJECTED SECURE HEADER
                });
                if (res.ok) {
                    loadApplications();
                    showToast('Application deleted.');
                }
            } catch (err) {
                showToast('Delete operation failed.');
            }
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredData = allData.filter(app => app.applicant_name.toLowerCase().includes(q) || app.phone.includes(q));
            renderTable(filteredData);
        }

        window.onload = loadApplications;
    </script>
</body>
</html>
